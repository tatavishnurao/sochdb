# =============================================================================
# SochDB Core Release Pipeline
# =============================================================================
#
# Builds Rust binaries and publishes to crates.io.
#
# SDK packages are maintained in separate repositories:
#   - Python SDK: https://github.com/sochdb/sochdb-python-sdk
#   - Node.js SDK: https://github.com/sochdb/sochdb-nodejs-sdk
#   - Go SDK: https://github.com/sochdb/sochdb-go
#
# Platforms supported:
#   - Linux x86_64 (manylinux)
#   - Linux aarch64 (ARM64) — AWS Graviton, Ampere Altra
#   - macOS ARM64 (Apple Silicon)
#   - macOS x86_64 (Intel)
#   - Windows x64
#
# =============================================================================
# REQUIRED SETUP:
# =============================================================================
# 
# 1. Create GitHub Environment "sochdb-workflow":
#    Settings → Environments → New environment → Name: "sochdb-workflow"
#
# 2. Add Environment Secrets (in the sochdb-workflow environment):
#    CRATES_IO_TOKEN   - crates.io API token (https://crates.io/settings/tokens)
#
# 3. GITHUB_TOKEN - NO ACTION NEEDED!
#    Automatically provided by GitHub Actions. Do NOT add as a secret.
#    Used for: Git operations, creating releases
# =============================================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.2.4)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (validate without publishing)'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-unified-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RELEASE_VERSION: ${{ inputs.version }}

jobs:
  # ===========================================================================
  # Validate - Basic workspace validation (formatting/tests done locally)
  # ===========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Workspace validation
        run: echo "✅ Workspace validated (formatting and tests verified locally)"

  # ===========================================================================
  # Build Rust Binaries - Matrix for all platforms
  # ===========================================================================
  build-binaries:
    name: Build Binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false  # Continue building other platforms if one fails
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_ext: ""
            lib_ext: ".so"

          # Linux aarch64 (ARM64) — AWS Graviton, Ampere Altra, RPi
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_ext: ""
            lib_ext: ".so"
            
          # macOS ARM64 (Apple Silicon) - Rosetta 2 handles x86 apps
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_ext: ""
            lib_ext: ".dylib"

          # macOS x86_64 (Intel) — cross-compiled on Apple Silicon
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_ext: ""
            lib_ext: ".dylib"
            
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
            lib_ext: ".dll"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        shell: bash
        run: |
          # Build libraries first (needed by all platforms)
          cargo build --release --target ${{ matrix.target }} \
            -p sochdb-storage \
            -p sochdb-index
          
          # Build binaries (sochdb-server is Unix-only)
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            # Windows: skip sochdb-server (uses Unix sockets)
            cargo build --release --target ${{ matrix.target }} \
              --bin sochdb-bulk \
              --bin sochdb-grpc-server \
              --bin sochdb-mcp
          else
            # Unix: build all binaries
            cargo build --release --target ${{ matrix.target }} \
              -p sochdb-tools \
              -p sochdb-grpc \
              -p sochdb-mcp
          fi

      - name: Create artifact directory
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          
          # Copy binaries and shared libraries
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Binaries (no sochdb-server on Windows - uses Unix sockets)
            cp target/${{ matrix.target }}/release/sochdb-bulk.exe artifacts/${{ matrix.target }}/
            cp target/${{ matrix.target }}/release/sochdb-grpc-server.exe artifacts/${{ matrix.target }}/
            cp target/${{ matrix.target }}/release/sochdb-mcp.exe artifacts/${{ matrix.target }}/
            # Shared libraries (DLLs)
            cp target/${{ matrix.target }}/release/sochdb_storage.dll artifacts/${{ matrix.target }}/
            cp target/${{ matrix.target }}/release/sochdb_index.dll artifacts/${{ matrix.target }}/
          else
            # Binaries (Unix: Linux + macOS)
            cp target/${{ matrix.target }}/release/sochdb-bulk artifacts/${{ matrix.target }}/
            cp target/${{ matrix.target }}/release/sochdb-server artifacts/${{ matrix.target }}/
            cp target/${{ matrix.target }}/release/sochdb-grpc-server artifacts/${{ matrix.target }}/
            cp target/${{ matrix.target }}/release/sochdb-mcp artifacts/${{ matrix.target }}/
            # Shared libraries (.so or .dylib)
            cp target/${{ matrix.target }}/release/libsochdb_storage${{ matrix.lib_ext }} artifacts/${{ matrix.target }}/
            cp target/${{ matrix.target }}/release/libsochdb_index${{ matrix.lib_ext }} artifacts/${{ matrix.target }}/
            chmod +x artifacts/${{ matrix.target }}/*
          fi

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: artifacts/
          retention-days: 1

  # ===========================================================================
  # Publish Rust Crates
  # ===========================================================================
  publish-rust:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    environment:
      name: sochdb-workflow
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          DRY_RUN="${{ inputs.dry_run }}"
          
          # Verify token is set
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "❌ ERROR: CARGO_REGISTRY_TOKEN is not set!"
            echo "Please add CRATES_IO_TOKEN to the sochdb-workflow environment secrets"
            echo "Go to: https://github.com/sochdb/sochdb/settings/environments"
            exit 1
          fi
          
          publish_crate() {
            local crate=$1
            local pkg_name=${2:-$1}  # Allow override for crates published under different name
            echo "📦 Publishing $crate (as $pkg_name)..."
            cd $crate
            if [ "$DRY_RUN" = "true" ]; then
              cargo publish --dry-run --allow-dirty
            else
              # Attempt publish; tolerate an already-published version (exit 0) but
              # fail on real errors. cargo emits two different messages depending on
              # timing: "already uploaded" (just-pushed, mid-index) and
              # "already exists on crates.io index" (fully indexed/live) — a
              # re-run after a partial publish hits the latter, so match both.
              OUTPUT=$(cargo publish --allow-dirty 2>&1) && RC=0 || RC=$?
              if [ $RC -ne 0 ]; then
                if echo "$OUTPUT" | grep -qE "already uploaded|already exists on crates\.io"; then
                  echo "⚠️ $pkg_name is already published, skipping"
                else
                  echo "❌ Failed to publish $pkg_name (exit code $RC):"
                  echo "$OUTPUT"
                  cd ..
                  return $RC
                fi
              fi
              # Wait for crates.io to index — dependents need this available
              echo "⏳ Waiting for $pkg_name to be indexed on crates.io..."
              sleep 45
            fi
            cd ..
          }
          
          # ── Publish in STRICT topological order ──
          # Every crate's INTERNAL (path) deps must already be on crates.io
          # before it publishes, or cargo fails with "no matching package".
          # Keep this graph in sync whenever a crate gains a new sochdb-* dep —
          # sochdb-vector and sochdb-memory were missing here, which is why
          # sochdb-grpc (which depends on both) failed to publish:
          #   sochdb-core    → (none)
          #   sochdb-kernel  → core
          #   sochdb-index   → core
          #   sochdb-storage → core, index
          #   sochdb-query   → core, storage, index
          #   sochdb-vector  → core, storage, index
          #   sochdb-memory  → core, storage, query, vector, index
          #   sochdb-client  → core, storage, index, query                  (published as 'sochdb')
          #   sochdb-grpc    → core, kernel, index, storage, query, vector, memory
          #   sochdb-mcp     → core, query

          # Layer 0: no internal deps
          publish_crate sochdb-core

          # Layer 1: depends only on core
          publish_crate sochdb-kernel
          publish_crate sochdb-index

          # Layer 2: depends on core + index
          publish_crate sochdb-storage

          # Layer 3: depends on core + storage + index
          publish_crate sochdb-query
          publish_crate sochdb-vector

          # Layer 4: depends on core + storage + query + vector + index
          publish_crate sochdb-memory

          # Layer 5: top-level crates — need every layer above
          publish_crate sochdb-client sochdb  # published as 'sochdb' on crates.io
          publish_crate sochdb-grpc           # needs vector + memory (now published above)
          publish_crate sochdb-mcp

  # ===========================================================================
  # Create GitHub Release with all artifacts
  # ===========================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-rust
    if: ${{ inputs.dry_run != true }}
    permissions:
      contents: write  # Required to create releases and upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: release-binaries/
          merge-multiple: true

      - name: Create release archives
        run: |
          mkdir -p release-assets
          
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu aarch64-apple-darwin x86_64-apple-darwin x86_64-pc-windows-msvc; do
            if [ -d "release-binaries/$target" ]; then
              cd release-binaries
              if [ "$target" = "x86_64-pc-windows-msvc" ]; then
                zip -r "../release-assets/sochdb-${{ inputs.version }}-$target.zip" "$target"
              else
                tar -czvf "../release-assets/sochdb-${{ inputs.version }}-$target.tar.gz" "$target"
              fi
              cd ..
            fi
          done
          
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: SochDB v${{ inputs.version }}
          draft: false
          prerelease: false
          files: release-assets/*
          body: |
            ## SochDB v${{ inputs.version }}
            
            ### Installation
            
            **Rust (crates.io)**
            ```bash
            cargo add sochdb
            ```
            
            ### SDK Repositories
            
            Language SDKs are now maintained in separate repositories:
            
            - **Python**: https://github.com/sochdb/sochdb-python-sdk
            - **Node.js/TypeScript**: https://github.com/sochdb/sochdb-nodejs-sdk
            - **Go**: https://github.com/sochdb/sochdb-go
            
            ### Examples
            
            - **Python Examples**: https://github.com/sochdb/sochdb-python-examples
            - **Node.js Examples**: https://github.com/sochdb/sochdb-nodejs-examples
            - **Go Examples**: https://github.com/sochdb/sochdb-golang-examples
            
            ### Benchmarks
            
            See https://github.com/sochdb/sochdb-benchmarks for performance comparisons.
            
            ### Pre-built Binaries
            
            This release includes pre-built binaries for:
            - Linux x86_64
            - Linux aarch64 (ARM64) — AWS Graviton, Ampere Altra
            - macOS ARM64 (Apple Silicon)
            - macOS x86_64 (Intel)
            - Windows x64
            
            See [CHANGELOG.md](https://github.com/sochdb/sochdb/blob/main/CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Release Summary
  # ===========================================================================
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: publish-rust
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 SochDB Core Release v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "**Mode:** Dry Run (no packages published)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Mode:** Production Release" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| crates.io | \`sochdb\` | ${{ needs.publish-rust.result }} |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SDK Repositories" >> $GITHUB_STEP_SUMMARY
          echo "Language SDKs are maintained separately:" >> $GITHUB_STEP_SUMMARY
          echo "- [Python SDK](https://github.com/sochdb/sochdb-python-sdk)" >> $GITHUB_STEP_SUMMARY
          echo "- [Node.js SDK](https://github.com/sochdb/sochdb-nodejs-sdk)" >> $GITHUB_STEP_SUMMARY
          echo "- [Go SDK](https://github.com/sochdb/sochdb-go)" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platforms Built" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linux x86_64" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linux aarch64 (ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ macOS ARM64 (Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ macOS x86_64 (Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Windows x64" >> $GITHUB_STEP_SUMMARY
