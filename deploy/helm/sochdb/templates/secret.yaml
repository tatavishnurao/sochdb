{{- if and .Values.security.secrets.secretName (not (lookup "v1" "Secret" .Release.Namespace .Values.security.secrets.secretName)) }}
# This template creates the Secret only if it doesn't already exist.
# In practice, secrets should be created externally (e.g., via sealed-secrets,
# external-secrets-operator, or kubectl create secret).
#
# This is a placeholder that reminds operators to create the secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.security.secrets.secretName }}
  labels:
    {{- include "sochdb.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    sochdb.io/note: "Replace placeholder values with real credentials"
type: Opaque
stringData:
  jwt-secret: "CHANGE-ME-jwt-secret-minimum-32-chars"
  api-keys: "CHANGE-ME-api-key-1,CHANGE-ME-api-key-2"
  encryption-key: "CHANGE-ME-base64-encoded-256-bit-key"
{{- end }}
